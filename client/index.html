<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Лига Прогнозов — ЧМ-2026</title>
    <style>
      html, body { background: #0a0f1a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; }
    </style>
    <script>
      (function () {
        var BUILD_ID = '__BUILD_ID__';

        try {
          sessionStorage.setItem('liga_build_id', BUILD_ID);
        } catch (e) {}

        try {
          var hash = (location.hash || '').replace(/^#/, '');
          if (hash) {
            var params = new URLSearchParams(hash);
            var raw = params.get('tgWebAppData');
            if (raw) {
              var data = raw;
              var auth = new URLSearchParams(data).get('auth_date');
              if (auth && (Math.floor(Date.now() / 1000) - parseInt(auth, 10)) < 86400) {
                sessionStorage.setItem('liga_tg_init_data', data);
              }
            }
          }
        } catch (e) {}

        window.__APP_LOAD_TIMEOUT = setTimeout(function () {
          var root = document.getElementById('root');
          if (!root || !document.getElementById('boot-loading')) return;
          root.innerHTML =
            '<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;color:#94a3b8;font-size:15px;line-height:1.5;">' +
            '<p>Не удалось загрузить приложение.<br>Возможно, на телефоне остался старый кэш.</p>' +
            '<button type="button" onclick="location.reload()" style="background:#22c55e;color:#0a0f1a;border:none;border-radius:12px;padding:12px 24px;font-size:16px;font-weight:600;">Обновить</button>' +
            '</div>';
        }, 45000);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot-loading" style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#94a3b8;font-size:15px;">
        <div style="width:32px;height:32px;border:3px solid #1e293b;border-top-color:#22c55e;border-radius:50%;animation:boot-spin .8s linear infinite;"></div>
        <span>Загрузка...</span>
      </div>
    </div>
    <style>@keyframes boot-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
